services:
  - type: web
    name: ecocash-api
    runtime: node
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: npm start
    healthCheckPath: /api/health
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BOT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://ecocash-investment-copmanyzm.vercel.app